name: Deploy to Cloudflare Workers

on:
  push:
    branches: [main]
  workflow_dispatch:

jobs:
  deploy:
    runs-on: ubuntu-latest
    name: Deploy Worker
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Deploy to Cloudflare Workers
        uses: cloudflare/wrangler-action@v3
        with:
          apiToken: ${{ secrets.CF_API_TOKEN }}
          accountId: ${{ secrets.CF_ACCOUNT_ID }}
          command: deploy
        env:
          # Wrangler secrets are managed via the Cloudflare dashboard or wrangler CLI
          # Do NOT put real API keys here — use GitHub Secrets for the Cloudflare auth only
          # OKX secrets (OKX_API_KEY, OKX_API_SECRET, OKX_API_PASSPHRASE) are configured
          # in the Cloudflare dashboard: Workers & Pages > your-worker > Settings > Variables
